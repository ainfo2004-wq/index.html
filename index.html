<!DOCTYPE html>
<html>
<head>
    <title>Ferrari Drive Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial; }
        #ui { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 70px; height: 70px; background: rgba(255,0,0,0.4); border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 30px; pointer-events: auto; cursor: pointer; user-select: none; }
        #status { position: absolute; top: 10px; width: 100%; text-align: center; color: white; z-index: 5; }
    </style>
</head>
<body>
    <div id="status">جاري تشغيل المحرك... انتظر ثواني للسيارة</div>
    <div id="ui">
        <div class="btn" id="left">◀</div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div class="btn" id="up">▲</div>
            <div class="btn" id="down">▼</div>
        </div>
        <div class="btn" id="right">▶</div>
    </div>

    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, speed = 0;
        let keys = { f: false, b: false, l: false, r: false };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(5, 10, 5);
            scene.add(light);

            scene.add(new THREE.GridHelper(200, 50, 0xff0000, 0x222222));

            const loader = new THREE.GLTFLoader();
            // رابط السيارة
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb', (gltf) => {
                car = gltf.scene;
                scene.add(car);
                document.getElementById('status').innerHTML = "المحرك جاهز! استخدم الأزرار للقيادة";
            });

            // تحكم اللمس
            const setKey = (id, k, v) => {
                document.getElementById(id).onpointerdown = () => keys[k] = v;
                document.getElementById(id).onpointerup = () => keys[k] = !v;
            };
            setKey('up', 'f', true); setKey('down', 'b', true);
            setKey('left', 'l', true); setKey('right', 'r', true);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(car) {
                if(keys.f) speed += 0.01;
                if(keys.b) speed -= 0.01;
                if(keys.l) car.rotation.y += 0.04;
                if(keys.r) car.rotation.y -= 0.04;

                car.translateZ(speed);
                speed *= 0.95; // احتكاك
                camera.lookAt(car.position);
            }
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
