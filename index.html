<!DOCTYPE html>
<html>
<head>
    <title>Ferrari Quick Start</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial; }
        #ui { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 65px; height: 65px; background: rgba(255,0,0,0.7); border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 25px; pointer-events: auto; cursor: pointer; user-select: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="btn" id="left">◀</div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div class="btn" id="up">▲</div>
            <div class="btn" id="down">▼</div>
        </div>
        <div class="btn" id="right">▶</div>
    </div>

    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, speed = 0;
        let keys = { f: false, b: false, l: false, r: false };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 2));
            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(5, 10, 5);
            scene.add(light);

            // شبكة أرضية للتأكد من أنك ترى شيئاً فوراً
            scene.add(new THREE.GridHelper(500, 100, 0xff0000, 0x444444));

            // إنشاء "سيارة مؤقتة" (صندوق أحمر) في حال لم يظهر الموديل فوراً
            const geometry = new THREE.BoxGeometry(2, 1, 4);
            const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            car = new THREE.Mesh(geometry, material);
            scene.add(car); // الآن ستجد صندوقاً أحمر يمثل السيارة فوراً!

            // محاولة تحميل الموديل الحقيقي فوق الصندوق
            const loader = new THREE.GLTFLoader();
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb', (gltf) => {
                scene.remove(car); // حذف الصندوق
                car = gltf.scene; // وضع الفيراري
                scene.add(car);
            });

            const setupTouch = (id, key) => {
                const el = document.getElementById(id);
                el.onpointerdown = () => keys[key] = true;
                el.onpointerup = () => keys[key] = false;
            };
            setupTouch('up', 'f'); setupTouch('down', 'b');
            setupTouch('left', 'l'); setupTouch('right', 'r');

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(car) {
                if(keys.f) speed += 0.02;
                if(keys.b) speed -= 0.02;
                if(keys.l) car.rotation.y += 0.05;
                if(keys.r) car.rotation.y -= 0.05;
                car.translateZ(speed);
                speed *= 0.95;
                camera.lookAt(car.position);
            }
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
