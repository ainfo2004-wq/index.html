<!DOCTYPE html>
<html>
<head>
    <title>Fast 3D Car</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        #status { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-family: Arial; z-index: 10; }
    </style>
</head>
<body>
    <div id="status">جاري تشغيل المحرك... انتظر ظهور الشبكة الأرضية</div>
    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // إضاءة قوية جداً
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(5, 10, 5);
            scene.add(light);

            // إضافة شبكة أرضية (تظهر فوراً)
            const grid = new THREE.GridHelper(100, 40, 0xff0000, 0x444444);
            scene.add(grid);

            // تحميل سيارة Ferrari
            const loader = new THREE.GLTFLoader();
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb', (gltf) => {
                car = gltf.scene;
                scene.add(car);
                document.getElementById('status').innerHTML = "تم التحميل! السيارة تدور الآن";
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(car) car.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
