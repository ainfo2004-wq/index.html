<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>GTA V - Legend Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* واجهة السرعة والمعلومات */
        #hud { position: absolute; top: 30px; left: 30px; color: white; text-shadow: 2px 2px 4px #000; z-index: 100; pointer-events: none; }
        #speed-val { font-size: 48px; font-weight: 900; color: #fff; font-style: italic; display: inline-block; }
        #speed-unit { font-size: 20px; margin-left: 5px; color: #ff0000; }
        .game-text { font-size: 14px; color: #ccc; margin-top: 5px; border-left: 4px solid #f00; padding-left: 10px; }

        /* الخريطة المصغرة */
        #minimap { position: absolute; bottom: 30px; left: 30px; width: 150px; height: 150px; background: rgba(0,0,0,0.5); border: 3px solid #fff; border-radius: 10px; overflow: hidden; z-index: 100; }

        /* أزرار التحكم */
        #controls { position: absolute; bottom: 30px; right: 30px; display: grid; grid-template-areas: ". up ." "left down right"; gap: 10px; z-index: 100; pointer-events: none; }
        .btn { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; pointer-events: auto; cursor: pointer; backdrop-filter: blur(5px); }
        .btn:active { background: rgba(255,0,0,0.4); transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="hud">
        <div id="speed-container"><span id="speed-val">0</span><span id="speed-unit">KM/H</span></div>
        <div class="game-text">المدينة المتطورة - النسخة الأسطورية</div>
        <div class="game-text" style="font-size: 12px; color: #0f0;">التحكم: W,A,S,D أو الأزرار</div>
    </div>

    <div id="minimap"></div>

    <div id="controls">
        <div class="btn" style="grid-area: up;" id="up">▲</div>
        <div class="btn" style="grid-area: left;" id="left">◀</div>
        <div class="btn" style="grid-area: down;" id="down">▼</div>
        <div class="btn" style="grid-area: right;" id="right">▶</div>
    </div>

    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, mapCamera, mapRenderer, speed = 0;
        let keys = { f: false, b: false, l: false, r: false };

        function init() {
            // 1. المشهد الرئيسي
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.FogExp2(0x0a0a1a, 0.012);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 2. الخريطة المصغرة
            mapCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 500);
            mapRenderer = new THREE.WebGLRenderer({ antialias: true });
            mapRenderer.setSize(150, 150);
            document.getElementById('minimap').appendChild(mapRenderer.domElement);

            // 3. الإضاءة
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(100, 200, 100);
            sun.castShadow = true;
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x404040, 1.0));

            // 4. الطريق والأرصفة
            const roadGeo = new THREE.PlaneGeometry(25, 5000);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.receiveShadow = true;
            scene.add(road);

            // خطوط الطريق البيضاء
            for(let i = -200; i < 200; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 6), new THREE.MeshBasicMaterial({color: 0xffffff}));
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.05, i * 20);
                scene.add(line);
            }

            // 5. المباني والأضواء (توليد مدينة)
            for(let i = 0; i < 100; i++) {
                const h = 20 + Math.random() * 60;
                const bGeo = new THREE.BoxGeometry(15, h, 15);
                const bMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                const b = new THREE.Mesh(bGeo, bMat);
                let side = (i % 2 == 0) ? 30 : -30;
                b.position.set(side, h/2, (i-50) * 40);
                b.castShadow = true;
                scene.add(b);

                // إضافة شبابيك مضيئة عشوائياً
                if(Math.random() > 0.5) {
                    const l = new THREE.PointLight(0xffaa00, 1, 20);
                    l.position.set(side * 0.8, 5, (i-50) * 40);
                    scene.add(l);
                }
            }

            // 6. السيارة (نفس نظام الطوارئ الذكي)
            const carGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1, 5), new THREE.MeshStandardMaterial({color: 0xff0000, roughness: 0.2, metalness: 0.8}));
            body.position.y = 0.5;
            body.castShadow = true;
            carGroup.add(body);
            car = carGroup;
            scene.add(car);

            new THREE.GLTFLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb', (gltf) => {
                scene.remove(carGroup);
                car = gltf.scene;
                scene.add(car);
            });

            // التحكم بالكيبورد واللمس
            window.onkeydown = (e) => {
                if(e.key.toLowerCase() == 'w' || e.key == 'ArrowUp') keys.f = true;
                if(e.key.toLowerCase() == 's' || e.key == 'ArrowDown') keys.b = true;
                if(e.key.toLowerCase() == 'a' || e.key == 'ArrowLeft') keys.l = true;
                if(e.key.toLowerCase() == 'd' || e.key == 'ArrowRight') keys.r = true;
            };
            window.onkeyup = (e) => {
                if(e.key.toLowerCase() == 'w' || e.key == 'ArrowUp') keys.f = false;
                if(e.key.toLowerCase() == 's' || e.key == 'ArrowDown') keys.b = false;
                if(e.key.toLowerCase() == 'a' || e.key == 'ArrowLeft') keys.l = false;
                if(e.key.toLowerCase() == 'd' || e.key == 'ArrowRight') keys.r = false;
            };

            const setupT = (id, k) => {
                const el = document.getElementById(id);
                el.onpointerdown = () => keys[k] = true;
                el.onpointerup = () => keys[k] = false;
            };
            setupT('up','f'); setupT('down','b'); setupT('left','l'); setupT('right','r');

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(car) {
                if(keys.f) speed += 0.02;
                if(keys.b) speed -= 0.02;
                if(keys.l) car.rotation.y += 0.04;
                if(keys.r) car.rotation.y -= 0.04;

                car.translateZ(speed);
                speed *= 0.96;

                // تحديث الكاميرا الرئيسية (نعومة GTA)
                const offset = new THREE.Vector3(0, 5, 12).applyMatrix4(car.matrixWorld);
                camera.position.lerp(offset, 0.1);
                camera.lookAt(car.position.x, car.position.y + 1, car.position.z);

                // تحديث الخريطة المصغرة (كاميرا من الأعلى)
                mapCamera.position.set(car.position.x, 100, car.position.z);
                mapCamera.lookAt(car.position);

                // تحديث العداد
                document.getElementById('speed-val').innerText = Math.round(Math.abs(speed * 250));
            }
            renderer.render(scene, camera);
            mapRenderer.render(scene, mapCamera);
        }
        window.onload = init;
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
