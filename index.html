<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>GTA V - Action Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; }
        #speed { font-size: 40px; color: #0f0; font-weight: bold; }
        #wanted { color: #ffff00; font-size: 24px; margin-top: 5px; display: none; }
        #controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; user-select: none; }
        #fire-btn { background: rgba(255,0,0,0.5); width: 80px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="speed">0 KM/H</div>
        <div id="wanted">⚠️ مطلوب للشرطة!</div>
    </div>

    <div id="controls">
        <div class="btn" id="fire-btn">إطلاق 🔥</div>
        <div class="btn" id="up-btn">▲</div>
    </div>

    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>

    <script>
        let scene, camera, renderer, car, speed = 0;
        let npcs = [], policeCars = [], bullets = [];
        let keys = { w: false, s: false, a: false, d: false, space: false };
        let isWanted = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x404040, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // الطريق
            const road = new THREE.Mesh(new THREE.PlaneGeometry(40, 5000), new THREE.MeshStandardMaterial({color: 0x111111}));
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // سيارتك (اللاعب)
            car = createBoxVehicle(0xff0000);
            scene.add(car);

            // إنشاء المتجولين (NPCs)
            for(let i=0; i<30; i++) {
                let npc = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({color: Math.random() * 0xffffff}));
                npc.position.set(Math.random()*30 - 15, 1, Math.random()*400 - 200);
                scene.add(npc);
                npcs.push(npc);
            }

            // إنشاء سيارات الشرطة (مخفية في البداية)
            for(let i=0; i<3; i++) {
                let pCar = createBoxVehicle(0x0000ff);
                pCar.position.set(Math.random()*20, 0.5, -100);
                pCar.visible = false;
                scene.add(pCar);
                policeCars.push(pCar);
            }

            // التحكم
            window.onkeydown = (e) => {
                if(e.code === 'Space') shoot();
                keys[e.key.toLowerCase()] = true;
            };
            window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
            document.getElementById('fire-btn').onclick = shoot;
            document.getElementById('up-btn').onpointerdown = () => keys.w = true;
            document.getElementById('up-btn').onpointerup = () => keys.w = false;

            animate();
        }

        function createBoxVehicle(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4), new THREE.MeshStandardMaterial({color: color}));
            body.position.y = 0.5;
            group.add(body);
            return group;
        }

        function shoot() {
            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            bullet.position.copy(car.position);
            bullet.position.y = 0.8;
            bullet.direction = new THREE.Vector3(0, 0, 1).applyQuaternion(car.quaternion);
            scene.add(bullet);
            bullets.push(bullet);
        }

        function animate() {
            requestAnimationFrame(animate);

            if(keys.w) speed += 0.02;
            if(keys.s) speed -= 0.02;
            if(keys.a) car.rotation.y += 0.04;
            if(keys.d) car.rotation.y -= 0.04;

            car.translateZ(speed);
            speed *= 0.96;

            // نظام الشرطة
            if(Math.abs(speed) > 0.3) {
                isWanted = true;
                document.getElementById('wanted').style.display = 'block';
            }

            // حركة الشرطة والمتجولين
            policeCars.forEach(p => {
                if(isWanted) {
                    p.visible = true;
                    p.lookAt(car.position);
                    p.translateZ(0.15);
                }
            });

            // الرصاص واصطدامه
            bullets.forEach((b, i) => {
                b.position.add(b.direction.clone().multiplyScalar(1));
                npcs.forEach(npc => {
                    if(b.position.distanceTo(npc.position) < 2) {
                        npc.position.y = -10; // قتل المتجول
                    }
                });
            });

            const offset = new THREE.Vector3(0, 5, 12).applyMatrix4(car.matrixWorld);
            camera.position.lerp(offset, 0.1);
            camera.lookAt(car.position);

            document.getElementById('speed').innerText = Math.round(Math.abs(speed * 250)) + " KM/H";
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
