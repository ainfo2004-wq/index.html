<!DOCTYPE html>
<html>
<head>
    <title>Ferrari Pro: Keyboard & Touch</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial; }
        #ui { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 65px; height: 65px; background: rgba(255,0,0,0.7); border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 25px; pointer-events: auto; cursor: pointer; user-select: none; }
        #speedometer { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: 'Courier New', monospace; font-size: 20px; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #0f0; }
    </style>
</head>
<body>
    <div id="speedometer">السرعة: 0 كم/س</div>
    <div id="ui">
        <div class="btn" id="left">◀</div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div class="btn" id="up">▲</div>
            <div class="btn" id="down">▼</div>
        </div>
        <div class="btn" id="right">▶</div>
    </div>

    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, speed = 0;
        let keys = { f: false, b: false, l: false, r: false };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 2));
            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(5, 10, 5);
            scene.add(light);

            // إضافة طريق إسفلتي بدلاً من الشبكة
            const roadGeo = new THREE.PlaneGeometry(100, 2000);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // خطوط الطريق البيضاء
            const grid = new THREE.GridHelper(2000, 100, 0xffffff, 0x333333);
            grid.rotation.x = Math.PI / 2;
            road.add(grid);

            // إنشاء السيارة (الصندوق الأحمر كبداية)
            const geometry = new THREE.BoxGeometry(2, 1, 4);
            const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            car = new THREE.Mesh(geometry, material);
            car.position.y = 0.5;
            scene.add(car);

            // تحميل الفيراري في الخلفية
            new THREE.GLTFLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb', (gltf) => {
                scene.remove(car);
                car = gltf.scene;
                scene.add(car);
            });

            // --- التحكم بالكيبورد ---
            window.addEventListener('keydown', (e) => {
                if(e.key === 'w' || e.key === 'ArrowUp') keys.f = true;
                if(e.key === 's' || e.key === 'ArrowDown') keys.b = true;
                if(e.key === 'a' || e.key === 'ArrowLeft') keys.l = true;
                if(e.key === 'd' || e.key === 'ArrowRight') keys.r = true;
            });
            window.addEventListener('keyup', (e) => {
                if(e.key === 'w' || e.key === 'ArrowUp') keys.f = false;
                if(e.key === 's' || e.key === 'ArrowDown') keys.b = false;
                if(e.key === 'a' || e.key === 'ArrowLeft') keys.l = false;
                if(e.key === 'd' || e.key === 'ArrowRight') keys.r = false;
            });

            // --- التحكم باللمس ---
            const setupTouch = (id, key) => {
                const el = document.getElementById(id);
                el.onpointerdown = () => keys[key] = true;
                el.onpointerup = () => keys[key] = false;
            };
            setupTouch('up', 'f'); setupTouch('down', 'b');
            setupTouch('left', 'l'); setupTouch('right', 'r');

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(car) {
                if(keys.f) speed += 0.02;
                if(keys.b) speed -= 0.02;
                if(keys.l) car.rotation
