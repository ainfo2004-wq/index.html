<!DOCTYPE html>
<html>
<head>
    <title>Ferrari Pro Drive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial; }
        #ui { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 65px; height: 65px; background: rgba(255,0,0,0.6); border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 25px; pointer-events: auto; cursor: pointer; user-select: none; }
        #status { position: absolute; top: 10px; width: 100%; text-align: center; color: white; z-index: 5; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>
    <div id="status">المحرك يسخن... ثواني وستظهر الفيراري</div>
    <div id="ui">
        <div class="btn" id="left">◀</div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div class="btn" id="up">▲</div>
            <div class="btn" id="down">▼</div>
        </div>
        <div class="btn" id="right">▶</div>
    </div>

    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, speed = 0;
        let keys = { f: false, b: false, l: false, r: false };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 2));
            const sun = new THREE.DirectionalLight(0xffffff, 3);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            scene.add(new THREE.GridHelper(500, 100, 0xff0000, 0x333333));

            const loader = new THREE.GLTFLoader();
            // هذا الرابط الموثوق من مكتبة Three.js
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb', (gltf) => {
                car = gltf.scene;
                scene.add(car);
                document.getElementById('status').innerHTML = "تم التشغيل! استمتع بالقيادة 🏎️";
            });

            const setupTouch = (id, key) => {
                const el = document.getElementById(id);
                el.onpointerdown = () => keys[key] = true;
                el.onpointerup = () => keys[key] = false;
            };
            setupTouch('up', 'f'); setupTouch('down', 'b');
            setupTouch('left', 'l'); setupTouch('right', 'r');

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(car) {
                if(keys.f) speed += 0.015;
                if(keys.b) speed -= 0.015;
                if(keys.l) car.rotation.y += 0.05;
                if(keys.r) car.rotation.y -= 0.05;
                car.translateZ(speed);
                speed *= 0.95;
                camera.lookAt(car.position);
            }
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
