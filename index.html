<!DOCTYPE html>
<html>
<head>
    <title>Fast Car Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        #status { position: absolute; top: 50%; width: 100%; text-align: center; color: white; font-family: Arial; }
    </style>
</head>
<body>
    <div id="status">جاري تشغيل المحرك... إذا طوّلت الشاشة سوداء أخبرني!</div>
    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // إضاءة شاملة (عشان ما تطلع السيارة سوداء)
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(5, 10, 5);
            scene.add(light);

            // إضافة أرضية "شبكة" (عشان تعرف إن اللعبة شغالة حتى لو السيارة ما طلعت)
            const grid = new THREE.GridHelper(100, 20, 0xffffff, 0x444444);
            scene.add(grid);

            // تحميل سيارة أخف وزناً (Ferrari)
            const loader = new THREE.GLTFLoader();
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb', 
                function(gltf) {
                    car = gltf.scene;
                    scene.add(car);
                    document.getElementById('status').style.display = 'none';
                },
                function(xhr) {
                    console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                },
                function(error) {
                    document.getElementById('status').innerHTML = "حدث خطأ في تحميل السيارة، جرب تحديث الصفحة";
                }
            );

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(car) car.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
