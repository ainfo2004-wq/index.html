<!DOCTYPE html>
<html>
<head>
    <title>GTA Advanced Open World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 15px; display: flex; justify-content: center; align-items: center; color: white; font-size: 30px; pointer-events: auto; cursor: pointer; user-select: none; }
        #stats { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border-left: 5px solid #ff0000; }
    </style>
</head>
<body>
    <div id="stats">
        <div id="speed">السرعة: 0 كم/س</div>
        <div style="font-size: 12px; color: #aaa; margin-top: 5px;">عالم مفتوح - نسخة 2026</div>
    </div>
    <div id="ui">
        <div class="btn" id="left">◀</div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div class="btn" id="up">▲</div>
            <div class="btn" id="down">▼</div>
        </div>
        <div class="btn" id="right">▶</div>
    </div>

    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, speed = 0;
        let keys = { f: false, b: false, l: false, r: false };
        let buildings = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // لون السماء
            scene.fog = new THREE.Fog(0x87CEEB, 1, 100); // ضباب لإعطاء عمق للمدينة

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // إضاءة الشمس
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(10, 20, 10);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x404040, 1.5));

            // الأرضية (الإسفلت)
            const groundGeo = new THREE.PlaneGeometry(2000, 2000);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // إنشاء المدينة (مباني عشوائية)
            for(let i=0; i<100; i++) {
                const h = 5 + Math.random() * 20;
                const bGeo = new THREE.BoxGeometry(5, h, 5);
                const bMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
                const b = new THREE.Mesh(bGeo, bMat);
                b.position.set(Math.random()*100 - 50, h/2, Math.random()*400 - 200);
                // ابعاد المباني عن الطريق الرئيسي
                if(Math.abs(b.position.x) < 8) b.position.x += 15; 
                scene.add(b);
                buildings.push(b);
            }

            // السيارة (المرجع الأساسي)
            const carGeo = new THREE.BoxGeometry(2, 1, 4);
            const carMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            car = new THREE.Mesh(carGeo, carMat);
            car.position.y = 0.5;
            scene.add(car);

            // تحميل الفيراري فوق المجسم
            new THREE.GLTFLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb', (gltf) => {
                scene.remove(car);
                car = gltf.scene;
                scene.add(car);
            });

            // تحكم الكيبورد
            window.onkeydown = (e) => {
                if(e.key == 'w' || e.key == 'ArrowUp') keys.f = true;
                if(e.key == 's' || e.key == 'ArrowDown') keys.b = true;
                if(e.key == 'a' || e.key == 'ArrowLeft') keys.l = true;
                if(e.key == 'd' || e.key == 'ArrowRight') keys.r = true;
            };
            window.onkeyup = (e) => {
                if(e.key == 'w' || e.key == 'ArrowUp') keys.f = false;
                if(e.key == 's' || e.key == 'ArrowDown') keys.b = false;
                if(e.key == 'a' || e.key == 'ArrowLeft') keys.l = false;
                if(e.key == 'd' || e.key == 'ArrowRight') keys.r = false;
            };

            // تحكم اللمس
            const setupT = (id, k) => {
                document.getElementById(id).onpointerdown = () => keys[k] = true;
                document.getElementById(id).onpointerup = () => keys[k] = false;
            };
            setupT('up','f'); setupT('down','b'); setupT('left','l'); setupT('right','r');

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(car) {
                if(keys.f) speed += 0.02;
                if(keys.b) speed -= 0.02;
                if(keys.l) car.rotation.y += 0.04;
                if(keys.r) car.rotation.y -= 0.04;

                car.translateZ(speed);
                speed *= 0.96;

                // الكاميرا تتبع السيارة بذكاء
                const relativeCameraOffset = new THREE.Vector3(0, 5, 12);
                const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
                camera.position.x = cameraOffset.x;
                camera.position.y = cameraOffset.y;
                camera.position.z = cameraOffset.z;
                camera.lookAt(car.position);

                document.getElementById('speed').innerHTML = "السرعة: " + Math.round(Math.abs(speed * 250)) + " كم/س";
            }
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
