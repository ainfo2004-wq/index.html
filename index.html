<!DOCTYPE html>
<html>
<head>
    <title>Realistic Ferrari 2026</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #loading { position: absolute; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; font-family: sans-serif; z-index: 100; }
    </style>
</head>
<body>
    <div id="loading">جاري تحميل الفيراري... انتظر ثواني</div>
    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car;
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(5, 3, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 3);
            sun.position.set(5, 10, 7);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            const loader = new THREE.GLTFLoader();
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb', function(gltf) {
                car = gltf.scene;
                scene.add(car);
                document.getElementById('loading').style.display = 'none';
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(car) car.rotation.y += 0.01; 
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
